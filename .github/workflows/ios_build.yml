name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          flutter pub get
          flutter precache --ios
          
      - name: Prepare iOS build
        run: |
          # Manually generate Generated.xcconfig to ensure it matches the runner environment
          # This prevents the Podfile from searching for Windows paths or failing due to missing files
          mkdir -p ios/Flutter
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" > ios/Flutter/Generated.xcconfig
          echo "FLUTTER_APPLICATION_PATH=$GITHUB_WORKSPACE" >> ios/Flutter/Generated.xcconfig
          echo "PACKAGE_CONFIG=.dart_tool/package_config.json" >> ios/Flutter/Generated.xcconfig
          
          # Create a dummy GoogleService-Info.plist if missing
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>dummy</key><string>true</string></dict></plist>' > ios/Runner/GoogleService-Info.plist
          fi

      - name: Build iOS
        run: |
          # Running with --verbose to help debug if it fails again
          flutter build ios --release --no-codesign --verbose
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r VISTA-APP.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VISTA-iOS-Install-File
          path: VISTA-APP.ipa
