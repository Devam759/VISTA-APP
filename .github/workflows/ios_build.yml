name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          flutter pub get
          # Explicitly trigger flutter build ios --config to generate xcconfig files
          # but don't run the full build yet
          # This ensures Generated.xcconfig exists with the correct FLUTTER_ROOT
          
      - name: Build iOS
        run: |
          # Create a dummy GoogleService-Info.plist if missing to allow build to complete
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "Creating dummy GoogleService-Info.plist"
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>dummy</key><string>true</string></dict></plist>' > ios/Runner/GoogleService-Info.plist
          fi
          
          # We use --pub to ensure it doesn't try to run pub get internally which might reset files
          # The main goal is to get Runner.app
          flutter build ios --release --no-codesign
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r VISTA-APP.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VISTA-iOS-Install-File
          path: VISTA-APP.ipa
