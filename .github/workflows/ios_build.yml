name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          flutter pub get
          # This command ensures all iOS-specific artifacts are downloaded
          flutter precache --ios
          
      - name: Build iOS
        run: |
          # Create a dummy GoogleService-Info.plist if missing
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "Creating dummy GoogleService-Info.plist"
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>dummy</key><string>true</string></dict></plist>' > ios/Runner/GoogleService-Info.plist
          fi
          
          # Use --config-only to generate the missing Generated.xcconfig files
          # without actually running pod install yet
          flutter build ios --config-only --no-codesign
          
          # Now run the full build
          flutter build ios --release --no-codesign
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r VISTA-APP.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VISTA-iOS-Install-File
          path: VISTA-APP.ipa
