name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          
      - name: Debug Environment
        run: |
          echo "FLUTTER_ROOT: $FLUTTER_ROOT"
          ls -R "$FLUTTER_ROOT/packages/flutter_tools/bin/xcode_backend.rb" || echo "File not found at standard path"
          find "$FLUTTER_ROOT" -name "xcode_backend.rb" | head -n 1
          
      - name: Install dependencies
        run: |
          flutter pub get
          flutter precache --ios
          
      - name: Build iOS
        run: |
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>dummy</key><string>true</string></dict></plist>' > ios/Runner/GoogleService-Info.plist
          fi
          
          # Force generation of config files
          flutter build ios --release --no-codesign --verbose
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r VISTA-APP.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VISTA-iOS-Install-File
          path: VISTA-APP.ipa
