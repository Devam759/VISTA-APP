name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          
      - name: Install dependencies
        run: |
          flutter pub get
          flutter precache --ios
          
      - name: Generate iOS Config
        run: |
          # Create dummy GoogleService-Info.plist if missing
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>dummy</key><string>true</string></dict></plist>' > ios/Runner/GoogleService-Info.plist
          fi
          
          # Create dummy .env if missing (it's ignored by git but required by pubspec.yaml)
          if [ ! -f ".env" ]; then
            echo "FIREBASE_API_KEY_ANDROID=dummy" > .env
            echo "FIREBASE_API_KEY_IOS=dummy" >> .env
            echo "FIREBASE_API_KEY_WEB=dummy" >> .env
          fi
          
          flutter build ios --config-only --no-codesign
          
      - name: Build iOS
        run: |
          # Use --debug with --simulator because Release mode isn't supported for simulators.
          flutter build ios --debug --simulator
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphonesimulator/Runner.app Payload/
          zip -r VISTA-APP.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VISTA-iOS-Install-File
          path: VISTA-APP.ipa
