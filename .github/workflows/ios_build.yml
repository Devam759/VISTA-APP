name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          channel: 'stable'
          
      - name: Debug and Link Flutter Tools
        run: |
          echo "Locating Flutter tools..."
          find "$FLUTTER_ROOT" -name "podhelper.rb"
          PODHELPER_PATH=$(find "$FLUTTER_ROOT" -name "podhelper.rb" | head -n 1)
          XCODE_BACKEND_PATH=$(find "$FLUTTER_ROOT" -name "xcode_backend.rb" | head -n 1)
          
          mkdir -p ios/Flutter
          if [ -n "$PODHELPER_PATH" ]; then
            cp "$PODHELPER_PATH" ios/Flutter/podhelper.rb
            echo "Copied podhelper.rb to ios/Flutter/"
          fi
          
          # Create a valid Generated.xcconfig for the runner
          echo "FLUTTER_ROOT=$FLUTTER_ROOT" > ios/Flutter/Generated.xcconfig
          echo "FLUTTER_APPLICATION_PATH=$GITHUB_WORKSPACE" >> ios/Flutter/Generated.xcconfig
          echo "PACKAGE_CONFIG=.dart_tool/package_config.json" >> ios/Flutter/Generated.xcconfig
          echo "COCOAPODS_PARALLEL_CODE_SIGN=true" >> ios/Flutter/Generated.xcconfig

      - name: Install dependencies
        run: |
          flutter pub get
          flutter precache --ios
          
      - name: Prepare Assets
        run: |
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>dummy</key><string>true</string></dict></plist>' > ios/Runner/GoogleService-Info.plist
          fi
          if [ ! -f ".env" ]; then
            echo "FIREBASE_API_KEY_ANDROID=dummy" > .env
            echo "FIREBASE_API_KEY_IOS=dummy" >> .env
            echo "FIREBASE_API_KEY_WEB=dummy" >> .env
          fi

      - name: Install iOS Pods
        run: |
          cd ios
          pod repo update
          pod install

      - name: Build iOS
        run: |
          # Build specifically for the simulator in debug mode to bypass code signing
          flutter build ios --debug --simulator --no-codesign --no-pub
          
      - name: Create IPA
        run: |
          mkdir -p Payload
          mv build/ios/iphonesimulator/Runner.app Payload/
          zip -r VISTA-APP.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VISTA-iOS-Install-File
          path: VISTA-APP.ipa
